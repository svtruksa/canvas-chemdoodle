<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<!-- ChemDoodle libraries -->
<link rel="stylesheet" href="https://unpkg.com/chemdoodle@9.3.0/ChemDoodleWeb.css">
<script src="https://unpkg.com/chemdoodle@9.3.0/ChemDoodleWeb.js"></script>
<script src="https://unpkg.com/chemdoodle@9.3.0/ChemDoodleWeb-uis.js"></script>

<style>
  body { margin:0; }
</style>
</head>

<body>

<canvas id="molCanvas" width="400" height="400"></canvas>

<script>
  // Create 3D canvas
  var canvas = new ChemDoodle.TransformCanvas3D('molCanvas', 400, 400);

  // Example molecule (water)
  var mol = ChemDoodle.readXYZ(`
3
water
O 0.000 0.000 0.000
H 0.758 0.000 0.504
H -0.758 0.000 0.504
`);

  canvas.loadMolecule(mol);
</script>

</body>
</html>
